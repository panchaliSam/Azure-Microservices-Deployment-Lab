<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure Microservices Lab Frontend</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    button {
      padding: 10px 16px;
      cursor: pointer;
    }
    pre {
      background: #f4f4f4;
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>Azure Microservices Lab</h1>
  <p>Click the button to fetch sample products from the gateway.</p>

  <button id="loadProductsBtn">Load Products</button>
  <h3>Response:</h3>
  <pre id="output">No data yet.</pre>

  <script>
    const output = document.getElementById("output");
    const button = document.getElementById("loadProductsBtn");

    // For local testing, gateway defaults to http://localhost:3000
    const gatewayBaseUrl = "http://localhost:3000";

    button.addEventListener("click", async () => {
      output.textContent = "Loading...";
      try {
        const response = await fetch(`${gatewayBaseUrl}/api/products`);
        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = `Error: ${error.message}`;
      }
    });
  </script>
</body>
</html>
